<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login Wajib Pajak</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; }
        .card-elegant { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .btn-elegant { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; border-radius: 8px; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="card card-elegant p-4" style="width: 400px;">
        <div class="text-center mb-4">
            <h3 class="fw-bold" style="color: #1e3c72;"><i class="fa-solid fa-building-columns me-2"></i>E-Filing Pajak</h3>
            <p class="text-muted">Silakan login untuk melaporkan SPT</p>
        </div>

        <!-- Notifikasi Error Jika Password Salah -->
        {% if error %}
            <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}

        <form action="" method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">NPWP</label>
                <input type="text" name="npwp" class="form-control" placeholder="Masukkan NPWP" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Masukkan Password" required>
            </div>
            <button type="submit" class="btn btn-elegant w-100 py-2">Masuk Sistem</button>
            <div class="text-center mt-3">
                <p class="text-muted" style="font-size: 0.9rem;">Belum punya akun? <a href="{% url 'daftar' %}" class="text-decoration-none fw-bold" style="color: #1e3c72;">Daftar WP Baru</a></p>
            </div>
        </form>
    </div>

</body>
</html>
