<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Registrasi Wajib Pajak</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; }
        .card-elegant { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .btn-elegant { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; border-radius: 8px; }
        .btn-elegant:hover { color: white; opacity: 0.9; }
        .form-label { font-weight: 600; color: #495057; font-size: 0.9rem; margin-bottom: 0.3rem; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 py-5">

    <div class="card card-elegant p-4" style="width: 100%; max-width: 700px;">
        <div class="text-center mb-4">
            <h3 class="fw-bold" style="color: #1e3c72;"><i class="fa-solid fa-user-plus me-2"></i>Registrasi WP</h3>
            <p class="text-muted">Lengkapi data untuk membuat akun E-Filing</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} py-2">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form action="{% url 'daftar' %}" method="POST">
            {% csrf_token %}
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">NPWP</label>
                    <input type="text" name="npwp" class="form-control" placeholder="15 Digit NPWP" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">NIK</label>
                    <input type="text" name="nik" class="form-control" placeholder="16 Digit NIK" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Nama Lengkap</label>
                <input type="text" name="nama" class="form-control" placeholder="Sesuai KTP/NPWP" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Alamat Lengkap</label>
                <textarea name="alamat" class="form-control" rows="2" placeholder="Masukkan alamat saat ini" required></textarea>
            </div>

            <div class="row">
                <div class="col-md-5 mb-4">
                    <label class="form-label">Email Aktif</label>
                    <input type="email" name="email" class="form-control" placeholder="email@contoh.com" required>
                </div>
                <div class="col-md-3 mb-4">
                    <label class="form-label">Jenis WP</label>
                    <select name="jenis" class="form-select" required>
                        <option value="P">Pribadi</option>
                        <option value="B">Badan</option>
                    </select>
                </div>
                <div class="col-md-4 mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Buat Password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-elegant w-100 py-2 mb-3">Daftar Akun Sekarang</button>
            
            <div class="text-center">
                <p class="text-muted mb-0" style="font-size: 0.9rem;">Sudah punya akun? <a href="{% url 'login_view' %}" class="text-decoration-none fw-bold" style="color: #1e3c72;">Login di sini</a></p>
            </div>
        </form>
    </div>

</body>
</html>
